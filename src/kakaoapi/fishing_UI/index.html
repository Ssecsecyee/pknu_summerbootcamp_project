<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부산 낚시 안전 가이드 챗봇</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="phone-mockup intro-screen" id="introScreen">
        <div class="status-bar">
            <span>15:20</span>
            <span class="material-symbols-outlined" style="font-size: 16px;">signal_cellular_alt wifi battery_full</span>
        </div>
        <div class="intro-content">
            <div class="intro-icon-circle">
                <span class="material-symbols-outlined">sailing</span>
            </div>
            <div class="intro-title">부산 낚시 안전 가이드<br>챗봇 서비스</div>
            <button class="start-btn" onclick="startChat()">Start a new chat</button>
        </div>
    </div>

    <div class="phone-mockup chat-screen" id="chatScreen">
        <div class="status-bar">
            <span>15:20</span>
            <span class="material-symbols-outlined" style="font-size: 16px;">signal_cellular_alt wifi battery_full</span>
        </div>
        
        <div class="chat-header">
            <div class="header-left" onclick="goBack()">
                <span class="material-symbols-outlined" style="cursor: pointer;">arrow_back_ios</span>
            </div>
            <div class="header-center">
                <h3 class="bot-name">안전 가이드 봇</h3>
                <div class="bot-status">Online</div>
            </div>
            <div class="header-right">
                <div class="profile-circle gps-btn" onclick="askLocation()" title="내 위치 공유하기">
                    <span class="material-symbols-outlined">my_location</span>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message-row bot-row">
                <div class="bot-avatar">
                    <span class="material-symbols-outlined">smart_toy</span>
                </div>
                <div class="bot-bubble">안녕하세요! 부산 낚시 안전 가이드입니다. 상단의 📍 버튼을 눌러 현재 위치를 공유해 주시면 주변의 안전 낚시터와 위험 구역을 스캔해 드려요!</div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="chatInput" placeholder="메시지를 입력하세요...">
            </div>
            <button class="send-btn" id="sendBtn">
                <span class="material-symbols-outlined" style="transform: rotate(-45deg); margin-left: 4px;">send</span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
